name: GenioAcademy CI/CD Pipeline

on:
  push:
    branches: [ "main", "release/contenido" ]
  pull_request:
    branches: [ "main", "release/contenido" ]

jobs:
  # ── INTEGRACIÓN CONTINUA (PRUEBAS Y VALIDACIÓN) ──
  test-and-validate:
    runs-on: ubuntu-latest
    
    services:
      # Levantamos una base de datos PostgreSQL de prueba aislada para los tests de Django
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: genio_db
          POSTGRES_USER: genio_user
          POSTGRES_PASSWORD: genio_password
        ports:
          - 5432:5432
        # Esperamos a que PostgreSQL responda antes de proceder
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4
      - name: Configurar Entorno Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias de Backend
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Ejecutar Pruebas Unitarias de Django (Backend)
        env:
          DATABASE_URL: postgres://genio_user:genio_password@localhost:5432/genio_db
          SECRET_KEY: django-insecure-test-key-for-github-actions
          PRODUCTION: "False"
        run: |
          python backend/manage.py test backend/

      # --- FRONTEND BUILD CHECK ---
      - name: Configurar Entorno Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar Dependencias de Frontend
        run: |
          cd frontend
          npm ci

      - name: Compilar Frontend (Build de Producción)
        run: |
          cd frontend
          npm run build

  # ── DESPLIEGUE CONTINUO (CONSTRUCCIÓN Y EMPAQUETADO DE CONTENEDORES) ──
  build-and-push-images:
    needs: test-and-validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release/contenido')
    
    steps:
      - name: Descargar Código del Repositorio
        uses: actions/checkout@v4

      - name: Configurar QEMU (Soporte Multi-Arquitectura)
        uses: docker/setup-qemu-action@v2

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Autenticar en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compilar y Empaquetar Imagen Backend (Django)
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true # Subir imagen al registro de Docker Hub
          tags: cristina2m/genio-backend:latest

      - name: Compilar y Empaquetar Imagen Frontend (React + Nginx)
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true # Subir imagen al registro de Docker Hub
          tags: cristina2m/genio-frontend:latest
